<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#033586">
    <title>Нет сети | Рука добра</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #081a46;
        background: linear-gradient(180deg, #eef5ff 0%, #ffffff 100%);
        font-family: Inter, Manrope, Arial, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 22px;
        border: 1px solid #d9e6fa;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 36px rgba(8, 46, 117, .12);
      }

      img {
        width: 56px;
        height: 56px;
        border-radius: 8px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #5e6f91;
        font-size: 15px;
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 18px;
        padding: 0 16px;
        border-radius: 8px;
        color: #fff;
        background: #e31e24;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/favicon.svg" alt="">
      <h1>Нет соединения</h1>
      <p>Откройте приложение после восстановления сети. Сохранённые файлы интерфейса уже доступны на устройстве.</p>
      <a href="/app">Повторить</a>
    </main>
  </body>
</html>
