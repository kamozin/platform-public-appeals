services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - laravel
      - nuxt
      - mailpit
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - .:/var/www/html:ro
    networks:
      - rukadobra

  laravel:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    environment:
      APP_NAME: ${APP_NAME:-Ruka Dobra}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:DaAjv5NAfwW0YMfCzp8N4j651Qun/86zb9p0qX1ixm4=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-https://rukadobra.localhost}
      APP_LOCALE: ${APP_LOCALE:-en}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-rukadobra}
      DB_USERNAME: ${MYSQL_USER:-rukadobra}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@rukadobra.localhost}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Ruka Dobra}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
      - mailpit
      - gotenberg
    expose:
      - "9000"
    networks:
      - rukadobra

  nuxt:
    image: node:22-alpine
    working_dir: /app
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_API_INTERNAL_BASE: ${NUXT_API_INTERNAL_BASE:-http://nginx:8080/api/v1}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api/v1}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://rukadobra.localhost}
    volumes:
      - ./frontend:/app
      - ./docker/node/dev-placeholder:/opt/dev-placeholder:ro
    command: >
      sh -lc "
        if [ -f package.json ]; then
          corepack enable &&
          if [ -f pnpm-lock.yaml ]; then
            pnpm install && pnpm dev --host 0.0.0.0;
          elif [ -f package-lock.json ]; then
            npm install && npm run dev -- --host 0.0.0.0;
          else
            npm install && npm run dev -- --host 0.0.0.0;
          fi;
        else
          node /opt/dev-placeholder/server.mjs;
        fi
      "
    expose:
      - "3000"
    networks:
      - rukadobra

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rukadobra}
      MYSQL_USER: ${MYSQL_USER:-rukadobra}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rukadobra

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rukadobra

  mailpit:
    image: axllent/mailpit:v1.21
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    expose:
      - "1025"
      - "8025"
    networks:
      - rukadobra

  gotenberg:
    image: gotenberg/gotenberg:8
    expose:
      - "3000"
    networks:
      - rukadobra

volumes:
  mysql_data:
  redis_data:

networks:
  rukadobra:
    driver: bridge
