<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title">
  <title id="title">Карта работы НКО в Брянске, Москве и Санкт-Петербурге</title>
  <defs>
    <filter id="mapShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#9fbee9" flood-opacity="0.3"/>
    </filter>
    <filter id="pinShadow" x="-80%" y="-40%" width="260%" height="240%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#0d47a1" flood-opacity="0.28"/>
    </filter>
    <filter id="labelShadow" x="-25%" y="-50%" width="150%" height="200%">
