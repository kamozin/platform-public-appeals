      <circle cy="52" r="5" fill="#073b9a"/>
      <path filter="url(#pinShadow)" fill="url(#bluePin)" d="M0 0c-20 0-36 16-36 37 0 31 36 66 36 66s36-35 36-66C36 16 20 0 0 0z"/>
      <circle cy="36" r="13" fill="#eef5ff"/>
      <rect x="43" y="34" width="206" height="42" rx="21" fill="#fff" filter="url(#labelShadow)"/>
      <text x="146" y="62" text-anchor="middle" font-size="23">Санкт-Петербург</text>
