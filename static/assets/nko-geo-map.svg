    </filter>
    <linearGradient id="mapFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#deedff"/>
    </linearGradient>
    <radialGradient id="westGlow" cx="30%" cy="51%" r="54%">
