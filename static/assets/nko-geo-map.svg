    <path fill="none" stroke="#bdd3f6" stroke-width="1.1" d="M122 197c38 23 73 30 109 21 45-12 74-45 123-40 38 4 65 25 98 21"/>
    <path fill="none" stroke="#bdd3f6" stroke-width="1.1" d="M176 301c55-29 112-34 172-14 46 16 88 18 126 4 47-17 89-12 136 24"/>
    <path fill="none" stroke="#bdd3f6" stroke-width="1.1" d="M252 138c22 38 18 76 41 105 21 26 57 32 82 54"/>
    <path fill="none" stroke="#bdd3f6" stroke-width="1.1" d="M494 135c-24 36-22 76-5 114 16 33 15 60-8 93"/>
