      <stop offset="0.58" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bluePin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2568d8"/>
      <stop offset="1" stop-color="#073b9a"/>
