    <path fill="url(#mapFill)" stroke="#9ebff0" stroke-width="1.7" d="M548 66l25-22 32 10 12 32-26 20-31-7-12-33z"/>
    <path fill="url(#mapFill)" stroke="#9ebff0" stroke-width="1.5" d="M358 38l20-12 18 9-3 20-20 10-18-8 3-19zM324 50l14-10 14 8-4 17-17 4-11-9 4-10zM669 229l17-10 18 8 7 20-17 11-21-8-4-21z"/>
