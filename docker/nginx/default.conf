map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream nuxt_ssr {
    server nuxt:3000;
}

upstream laravel_fpm {
    server laravel:9000;
}

upstream mailpit_ui {
    server mailpit:8025;
}

server {
    listen 80;
    server_name rukadobra.localhost mail.rukadobra.localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 8080;
    server_name _;

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass laravel_fpm;
        fastcgi_read_timeout 120s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mail.rukadobra.localhost;

    ssl_certificate /etc/nginx/certs/rukadobra.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/rukadobra.localhost-key.pem;

    location / {
        proxy_pass http://mailpit_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name rukadobra.localhost;

    ssl_certificate /etc/nginx/certs/rukadobra.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/rukadobra.localhost-key.pem;

    client_max_body_size 120m;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass laravel_fpm;
        fastcgi_read_timeout 120s;
    }

    location / {
        proxy_pass http://nuxt_ssr;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
